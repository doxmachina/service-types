name: Auto‑Update Service Types Documentation
permissions:
  contents: write
  pull-requests: write

on:
  push:
    paths:
      'schema/*.json'

jobs:
  regenerate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Create/update auto‑update branch
        run: |
          BRANCH="master"
          if git show-ref --verify --quiet refs/heads/$BRANCH; then
            git checkout $BRANCH
          else
            git checkout -b $BRANCH
          fi
          
      - name: Run documentation generator
        shell: pwsh
        run: |
          pwsh -File ./scripts/service-types-generator.ps1
          
      - name: Show diff
        run: git --no-pager diff --color

      - name: Commit changes
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Auto‑update: regenerate service types documentation"

      - name: Push branch
        run: |
          git push origin main

